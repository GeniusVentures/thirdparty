# This is a basic workflow to help you get started with Actions

name: Android Build

# Controls when the workflow will run
# Triggers the workflow on push or pull request events and manually from the Actions tab
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.gitignore'
  pull_request:
  workflow_dispatch:

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 1

jobs:
  Android:
      runs-on: ubuntu-latest
      env:
        ANDROID_NDK_HOME: ${{github.workspace}}/android-ndk/android-ndk-r25b
        ANDROID_TOOLCHAIN: ${{github.workspace}}/android-ndk/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/bin
        ANDROID_PLATFORM_LEVEL: 28
        ANDROID_NDK_LIB: ${{github.workspace}}/android-ndk/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/$ANDROID_PLATFORM_LEVEL

        NDK_URL: "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
        MAKEFLAGS: "-j1"

      steps:
        - name: Setup Git to make sure crlf -> lf
          run: |
            git config --global core.autocrlf false
            git config --global core.eol lf

        #- uses: nttld/setup-ndk@v1
        #  id: setup-ndk
        #  with:
        #    ndk-version: r21e

        - name: Download Android NDK
          run: |
            mkdir "${{github.workspace}}/android-ndk"
            cd "${{github.workspace}}/android-ndk"
            curl -o ndk.zip ${{ env.NDK_URL }}
            unzip ndk.zip
            rm ndk.zip

        - name: Set up JDK 1.8
          uses: actions/setup-java@v3
          with:
            java-version: 1.8

        - name: Setup Android SDK
          uses: android-actions/setup-android@v2

        - name:
          run: |
            export ANDROID_HOME=${{env.ANDROID_NDK_HOME}}
            sdkmanager --sdk_root=${ANDROID_HOME} "tools"
            sdkmanager --update
            sdkmanager --list
            sdkmanager "build-tools;28.0.3" "platform-tools" "platforms;android-28" "tools"
            sdkmanager --licenses
            echo "ANDROID_HOME directory:"
            ls -la $ANDROID_HOME
            export PATH="$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/tools/lib:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools"

        # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        - uses: actions/checkout@v2
          with:
            submodules: 'recursive'

        - name: Create Build Directory
          run: cmake -E make_directory ${{github.workspace}}/.build

        - name: Set PATH
          run: echo "${{env.ANDROID_TOOLCHAIN}}" >> $GITHUB_PATH

        - name: Configure CMake
          env:
            CC: clang

          working-directory: ${{github.workspace}}/.build
          run: |
            export ANDROID_NDK=${{env.ANDROID_NDK_HOME}}
            export ANDROID_NDK_HOME=${{env.ANDROID_NDK_HOME}}
            export ANDROID_TOOLCHAIN=${{env.ANDROID_TOOLCHAIN}}
            export ANDROID_NDK_LIB=${{env.ANDROID_NDK_LIB}}
            echo $PATH
            export PATH=${{env.ANDROID_TOOLCHAIN}}:${{env.ANDROID_NDK_LIB}}:$PATH
            echo $PATH
            echo $CC
            ls -la $ANDROID_TOOLCHAIN
            echo "Check clang path:"
            which clang
            env
            cmake -S ../build/Android/ -DANDROID_ABI="arm64-v8a" -DCMAKE_ANDROID_NDK=$ANDROID_NDK -DANDROID_TOOLCHAIN=clang
        - name: Compile
          working-directory: ${{github.workspace}}/.build
          run: make

